spring.application.name=budgetApp
# Datasource
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${POSTGRES_DB:budgetAppDB}
spring.datasource.username=${POSTGRES_USER:user2}
spring.datasource.password=${POSTGRES_PASSWORD:budgetapppass}

# Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
